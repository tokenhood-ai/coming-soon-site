<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tokenhood: Coming Soon</title>
  <meta name="description" content="A fair AI subscription service that doesn't arbitrarily limit you, where 20x means 1 billion tokens." />
  <meta name="color-scheme" content="dark light" />
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=general-sans@400,500,600&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="shell">
      <main id="content">
        <div class="hero">
          <h2>
            Know how many tokens you're paying for.
          </h2>
          <h1><span class="ghost">A fair <a class="buzzword">AI</a> subscription.</span></h1>
          <p class="subcopy">No "20x", "5x", time-windows, or other tricks to limit your usage. Pinky promise.</p>
        </div>
        
        <div class="command-wrap" aria-label="Terminal output">
          <p class="command">
            <span class="typed">
              <span class="prompt">&gt;</span> 
              <span class="typed-bin">./tokenhood</span> 
              <span class="typed-param">--deploy</span> one-billion-tokens 
              <span class="typed-param">--to</span> the-people 
              <span class="typed-param">--every</span> month
            </span>
          </p>
          <div class="panel-footer">
            <p class="footer-line"></p>
            <p class="footer-line"></p>
            <button class="theme-toggle" type="button" data-theme-toggle="" aria-label="Switch to light mode"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></button>
            <p class="footer-line">Contact: <a href="mailto:hello@tokenhood.ai">hello@tokenhood.ai</a></p>
          </div>
        </div>
      </main>

      <span class="frame-label" aria-hidden="true">coming soon</span>
    </section>
  </div>
  <script type="text/javascript" src="assets/js/theme.js"></script>
</body>
</html>
